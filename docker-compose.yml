services:
  postgres:
    image: postgres:15
    container_name: ecoshop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecoshop
      POSTGRES_USER: ecoshop
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    container_name: ecoshop-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@localmind.com
      PGADMIN_DEFAULT_PASSWORD: secret
    depends_on:
      - postgres

  backend:
    user: "1000:1000"
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecoshop-backend
    restart: unless-stopped
    volumes:
      - ./backend:/var/www
    depends_on:
      - postgres
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ecoshop
      DB_USERNAME: ecoshop
      DB_PASSWORD: secret

  nginx:
    image: nginx:alpine
    container_name: ecoshop-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www # Nginx needs access to the backend files
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecoshop-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data:
